name: Setup Java and dependency caches
description: Set up Java 25 and restore shared Maven/npm/Playwright caches.

inputs:
  cache-playwright:
    description: Restore the Playwright browser cache
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Set up Java 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Cache Maven repository
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          maven-

    - name: Cache npm dependencies
      uses: actions/cache@v4
      with:
        path: frontend/node_modules
        key: npm-${{ hashFiles('frontend/package-lock.json') }}
        restore-keys: |
          npm-

    - name: Cache Playwright browsers
      if: ${{ inputs.cache-playwright == 'true' }}
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-browsers-${{ runner.os }}-${{ hashFiles('pom.xml') }}
        restore-keys: |
          playwright-browsers-${{ runner.os }}-
