name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled, closed]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/reflect-direct/facilitator
  MAVEN_CLI_OPTS: --batch-mode --no-transfer-progress
  PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright

jobs:

  # ── Job 1: test ──────────────────────────────────────────────────────────────
  # Runs ALL tests: Maven Surefire + Testcontainers (PostgreSQL, Redis) + Vitest
  # ubuntu-latest has Docker pre-installed; required for Testcontainers
  # PRs can opt out temporarily by adding the 'skip-tests' label while iterating
  # on later CI stages such as image build/publish.
  test:
    name: Test
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'skip-tests') }}
    permissions:
      contents: read

    steps:
      - name: Shared test setup
        uses: ./.github/actions/setup-java-node-cache
        with:
          cache-playwright: 'true'

      - name: Install Playwright host dependencies
        run: sudo --preserve-env=PLAYWRIGHT_BROWSERS_PATH ./mvnw $MAVEN_CLI_OPTS -q -Dexec.classpathScope=test exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install-deps chromium"

      - name: Install Playwright browser binaries
        run: ./mvnw $MAVEN_CLI_OPTS -q -Dexec.classpathScope=test exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install chromium"

      - name: Run Java tests (Maven Surefire + Testcontainers)
        run: ./mvnw $MAVEN_CLI_OPTS clean test

      - name: Run frontend tests (Vitest)
        run: npm test
        working-directory: frontend

  # ── Job 2: conventional-commits ──────────────────────────────────────────────
  # Validates that every commit in the PR branch follows Conventional Commits.
  # Runs on pull_request only; push to main is already gated by this check on PRs.
  conventional-commits:
    name: conventional-commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages in PR range
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          PATTERN='^(feat|fix|refactor|docs|test|ci|build|chore)(\([^)]+\))?: .+'
          FAILED=0
          while IFS= read -r subject; do
            if ! echo "$subject" | grep -qE "$PATTERN"; then
              echo "❌ Non-conventional commit: $subject"
              FAILED=1
            fi
          done < <(git log --format='%s' "${BASE}..${HEAD}")
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "All commit subjects must match: $PATTERN"
            exit 1
          fi
          echo "✅ All commits follow Conventional Commits format."

  # ── Job 3: static-analysis ───────────────────────────────────────────────────
  # Runs the Maven verify lifecycle so Checkstyle, PMD, and SpotBugs execute
  # from lifecycle bindings. This currently surfaces the existing baseline debt
  # and is intentionally independent from image build/publish flow.
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Shared static-analysis setup
        uses: ./.github/actions/setup-java-node-cache
        with:
          cache-playwright: 'true'

      - name: Run Maven verify static analysis gate
        run: ./mvnw $MAVEN_CLI_OPTS -DskipTests verify

  # ── Job 4: build-image ───────────────────────────────────────────────────────
  # Builds the OCI image via Paketo buildpacks (Spring Boot Maven plugin) and,
  # when the publish condition is met, pushes it to GHCR on the same runner.
  # Build and push must run on the same runner — the image only exists in the
  # local Docker daemon and cannot be transferred between jobs without a tar artifact.
  # Version model:
  # - PR builds use operational preview tags: pr-<PR>-<SHA>
  # - main builds use operational promotion tags: sha-<SHA>
  # - only Git tags vX.Y.Z produce a formal release version X.Y.Z
  # Publish condition: main branch, version tag v*, or PR with 'preview' label.
  # PRs with the 'skip-tests' label may still run this job to speed up image-stage
  # iteration after earlier test failures have already been diagnosed.
  # BP_JVM_VERSION=25: required for Paketo Bellsoft Liberica to use Java 25.
  # SPRING_DOCKER_COMPOSE_ENABLED=false: must be disabled in the production image.
  build-image:
    name: Build Image
    runs-on: ubuntu-latest
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'skip-tests') && needs.test.result == 'skipped')) }}
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
      oci-version: ${{ steps.tag.outputs.oci_version }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Shared build-image setup
        uses: ./.github/actions/setup-java-node-cache

      - name: Compute deployment image version
        id: tag
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            SEMVER="${{ github.ref_name }}"
            SEMVER="${SEMVER#v}"
            # Formal release path: image tag and OCI version both use semver.
            echo "tag=${SEMVER}" >> "$GITHUB_OUTPUT"
            echo "sha_tag=sha-${SHA}" >> "$GITHUB_OUTPUT"
            echo "oci_version=${SEMVER}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            # Main branch path: operational deployment tag only, not a semantic release.
            echo "tag=sha-${SHA}" >> "$GITHUB_OUTPUT"
            echo "oci_version=sha-${SHA}" >> "$GITHUB_OUTPUT"
          else
            PR="${{ github.event.pull_request.number }}"
            # PR path: ephemeral preview tag only, not a semantic release.
            echo "tag=pr-${PR}-${SHA}" >> "$GITHUB_OUTPUT"
            echo "oci_version=pr-${PR}-${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build OCI image with Paketo buildpacks
        run: |
          ./mvnw $MAVEN_CLI_OPTS spring-boot:build-image \
            -Dspring-boot.build-image.imageName=${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            -Dspring-boot.build-image.env.BP_JVM_VERSION=25 \
            -Dspring-boot.build-image.env.BP_OCI_VERSION=${{ steps.tag.outputs.oci_version }} \
            -Dspring-boot.build-image.env.BP_OCI_REVISION=${{ github.sha }} \
            -Dspring-boot.build-image.env.SPRING_DOCKER_COMPOSE_ENABLED=false \
            -DskipTests

      - name: Push image to GHCR
        id: push
        if: |
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'preview'))
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          docker push ${{ env.IMAGE_NAME }}:${TAG}
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.IMAGE_NAME }}:${TAG} | cut -d@ -f2)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Push sha alias alongside release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
                     ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.sha_tag }}
          docker push ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.sha_tag }}

  # ── Job 5: update-gitops ─────────────────────────────────────────────────────
  # Commits the new image tag to the acc overlay in the infra repo.
  # Runs on main branch pushes only (not PRs, not tags).
  # Uses GITOPS_TOKEN (fine-grained PAT) for write access to facilitator-gitops.
  # Retries up to 3 times on non-fast-forward push failures.
  update-gitops:
    name: Update GitOps (acc)
    runs-on: ubuntu-latest
    needs: [build-image]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: reflect-direct/facilitator-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update acc image tag and push (with retry)
        working-directory: gitops
        env:
          IMAGE_TAG: ${{ needs.build-image.outputs.image-tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            (cd apps/facilitator/acc && kustomize edit set image ghcr.io/reflect-direct/facilitator:${IMAGE_TAG})

            git add apps/facilitator/acc/kustomization.yaml
            git commit -m "chore: update facilitator acc image to ${IMAGE_TAG} [skip ci]" || {
              echo "Nothing to commit (image tag already up to date)."
              exit 0
            }

            if git push origin main; then
              echo "✅ GitOps update pushed on attempt ${attempt}."
              exit 0
            fi

            echo "⚠️  Push failed (attempt ${attempt}/3). Rebasing and retrying..."
            git pull --rebase origin main
          done

          echo "❌ Failed to push GitOps update after 3 attempts."
          exit 1

  # ── Job 6: update-preview-gitops ─────────────────────────────────────────────
  # Creates or updates the per-PR preview overlay in facilitator-gitops.
  # Runs when a PR with the 'preview' label is opened, pushed, or labeled.
  # The overlay pins the exact pr-<N>-<sha> image tag so ArgoCD can sync it.
  update-preview-gitops:
    name: Update Preview GitOps
    runs-on: ubuntu-latest
    needs: [build-image]
    if: |
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'preview')
    permissions:
      contents: read

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: reflect-direct/facilitator-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Write preview overlay and push
        working-directory: gitops
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IMAGE_TAG: ${{ needs.build-image.outputs.image-tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          OVERLAY_DIR="apps/facilitator/previews/pr-${PR_NUMBER}"
          mkdir -p "${OVERLAY_DIR}"

          printf 'apiVersion: kustomize.config.k8s.io/v1beta1\nkind: Kustomization\nresources:\n  - ../../overlay\nnamespace: facilitator-preview-pr-%s\nimages:\n  - name: ghcr.io/reflect-direct/facilitator\n    newTag: "%s"\n' \
            "${PR_NUMBER}" "${IMAGE_TAG}" > "${OVERLAY_DIR}/kustomization.yaml"

          git add "${OVERLAY_DIR}/kustomization.yaml"
          git commit -m "chore: update facilitator preview pr-${PR_NUMBER} to ${IMAGE_TAG} [skip ci]" || {
            echo "Nothing to commit (overlay already up to date)."
            exit 0
          }
          git push origin main

  # ── Job 7: delete-preview-gitops ─────────────────────────────────────────────
  # Removes the per-PR preview overlay from facilitator-gitops on PR close or
  # when the 'preview' label is removed. ArgoCD prunes the preview app and
  # namespace automatically once the overlay directory is gone.
  # This job does NOT depend on build-image so it runs even when tests fail.
  delete-preview-gitops:
    name: Delete Preview GitOps
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      (github.event.action == 'closed' ||
       (github.event.action == 'unlabeled' && github.event.label.name == 'preview'))
    permissions:
      contents: read

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: reflect-direct/facilitator-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Delete preview overlay and push
        working-directory: gitops
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          OVERLAY_DIR="apps/facilitator/previews/pr-${PR_NUMBER}"
          if [ ! -d "${OVERLAY_DIR}" ]; then
            echo "No preview overlay found for pr-${PR_NUMBER}; nothing to delete."
            exit 0
          fi

          git rm -r "${OVERLAY_DIR}"
          git commit -m "chore: remove facilitator preview pr-${PR_NUMBER} [skip ci]"
          git push origin main
