spring:
  application:
    name: facilitator
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  session:
    timeout: 15m
  main:
    allow-bean-definition-overriding: true
    web-application-type: servlet
  docker:
    compose:
      enabled: false  # Disable Docker Compose for tests, use Testcontainers only
  # WORKAROUND: OAuth2 properties must be explicitly specified in test application.yaml
  # Root Cause: During @SpringBootTest context loading, OAuth2 properties from src/main/resources/application.yaml 
  # are not loaded in the correct order or are overridden by test-specific property resolution.
  # This ensures Spring's OAuth2ClientAutoConfiguration creates the required ClientRegistrationRepository bean.
  security:
    enabled: false  # Disable main SecurityConfig for tests
    oauth2:
      client:
        registration:
          github:
            client-id: test
            client-secret: test
            redirect-uri: http://localhost:8080/login/oauth2/code/github
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: login

logging:
  level:
    # Test logging - minimal noise, failures only
    "[direct.reflect.facilitator.integration]": DEBUG
    "[direct.reflect.facilitator]": ERROR              # Only actual errors
    "[direct.reflect.facilitator.web.RetroViewController]": DEBUG
    "[direct.reflect.facilitator.facilitation.ParticipantService]": DEBUG
    "[direct.reflect.facilitator.facilitation.RetroApiController]": DEBUG
    "[direct.reflect.facilitator.auth.AuthenticationHelper]": DEBUG
    "[direct.reflect.facilitator.facilitation.ParticipantRepository]": DEBUG
    
    # SSE cleanup errors are expected during test shutdown
    "[direct.reflect.facilitator.eventing.EventService]": ERROR
    "[direct.reflect.facilitator.common.exception.ApiExceptionHandler]": ERROR
    
    # BaseIntegrationTest - only show actual problems
    "[direct.reflect.facilitator.integration.BaseIntegrationTest]": INFO
    
    # Silence external noise completely
    "[org.springframework]": ERROR
    "[org.hibernate]": ERROR  
    "[org.testcontainers]": WARN
    "[com.zaxxer.hikari]": ERROR
    "[io.lettuce]": ERROR
    "[org.apache]": ERROR
    "[org.eclipse.jetty]": ERROR
