spring:
  application:
    name: facilitator
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  session:
    timeout: 15m
  main:
    allow-bean-definition-overriding: true
    web-application-type: servlet
  security:
    user:
      name: test
      password: test
  docker:
    compose:
      enabled: false  # Disable Docker Compose for tests, use Testcontainers only

logging:
  level:
    "[direct.reflect.facilitator]": DEBUG
    "[org.testcontainers]": INFO
    "[org.hibernate]": INFO
