spring:
  application:
    name: facilitator
  datasource:
    hikari:
      maximum-pool-size: 30          # Increase from default 10 for integration tests
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  session:
    timeout: 15m
  main:
    allow-bean-definition-overriding: true
    web-application-type: servlet
  docker:
    compose:
      enabled: false  # Disable Docker Compose for tests, use Testcontainers only
  # WORKAROUND: OAuth2 properties must be explicitly specified in test application.yaml
  # Root Cause: During @SpringBootTest context loading, OAuth2 properties from src/main/resources/application.yaml 
  # are not loaded in the correct order or are overridden by test-specific property resolution.
  # This ensures Spring's OAuth2ClientAutoConfiguration creates the required ClientRegistrationRepository bean.
  security:
    enabled: false  # Disable main SecurityConfig for tests
    oauth2:
      client:
        registration:
          github:
            client-id: test
            client-secret: test
            redirect-uri: http://localhost:8080/login/oauth2/code/github
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: login

logging:
  level:
    # Test logging - MINIMAL NOISE, package-level settings
    "[direct.reflect.facilitator.integration]": INFO                          # Test execution flow
    "[direct.reflect.facilitator.integration.BaseIntegrationTest]": DEBUG     # Enable debug for base test helpers
    "[direct.reflect.facilitator.facilitation]": DEBUG                        # Business logic (temporarily DEBUG for session start debugging)
    "[direct.reflect.facilitator.eventing]": DEBUG                            # SSE events (temporarily DEBUG to see session_started event)
    "[direct.reflect.facilitator.web]": WARN                                  # Controllers
    "[direct.reflect.facilitator.auth]": WARN                                 # Authentication
    "[direct.reflect.facilitator.common]": ERROR                              # Exceptions only
    "[direct.reflect.facilitator]": ERROR                                     # Catch-all

    # Silence external noise completely
    "[org.springframework]": ERROR
    "[org.hibernate]": ERROR
    "[org.testcontainers]": WARN
    "[com.zaxxer.hikari]": ERROR
    "[io.lettuce]": ERROR
    "[org.apache]": ERROR
    "[org.eclipse.jetty]": ERROR
