spring:
  docker:
    compose:
      enabled: false  # Disable Docker Compose for tests
  application:
    name: facilitator
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop  # Use create-drop for tests
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    direct.reflect.facilitator: DEBUG
    org.testcontainers: INFO
