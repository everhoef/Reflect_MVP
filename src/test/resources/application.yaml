spring:
  application:
    name: facilitator
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  session:
    timeout: 15m
  main:
    allow-bean-definition-overriding: true
    web-application-type: reactive
  security:
    user:
      name: test
      password: test
  sse:
    keepalive:
      interval: 100ms

logging:
  level:
    direct.reflect.facilitator: DEBUG
    org.testcontainers: INFO
    org.hibernate: INFO
    org.springframework.test: DEBUG
