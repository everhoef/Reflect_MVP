spring:
  application:
    name: facilitator
  datasource:
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
  session:
    timeout: 15m
  main:
    allow-bean-definition-overriding: true
    web-application-type: servlet
  docker:
    compose:
      enabled: false
  security:
    enabled: false
    oauth2:
      client:
        registration:
          github:
            client-id: test
            client-secret: test
            redirect-uri: http://localhost:8080/login/oauth2/code/github
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: login

server:
  shutdown: immediate
  tomcat:
    threads:
      max: 400
      min-spare: 20
    accept-count: 200
  servlet:
    async:
      timeout: 60000

facilitator:
  sse:
    timeout-ms: 30000

logging:
  level:
    "[direct.reflect.facilitator.integration]": INFO
    "[direct.reflect.facilitator.integration.BaseIntegrationTest]": DEBUG
    "[direct.reflect.facilitator.facilitation]": DEBUG
    "[direct.reflect.facilitator.eventing]": DEBUG
    "[direct.reflect.facilitator.web]": WARN
    "[direct.reflect.facilitator.auth]": WARN
    "[direct.reflect.facilitator.common]": ERROR
    "[direct.reflect.facilitator]": ERROR
    "[org.springframework]": ERROR
    "[org.hibernate]": ERROR
    "[org.testcontainers]": WARN
    "[com.zaxxer.hikari]": ERROR
    "[io.lettuce]": ERROR
    "[org.apache]": ERROR
    "[org.eclipse.jetty]": ERROR
