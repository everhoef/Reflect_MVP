<div th:fragment="content" class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-md" 
     hx-ext="sse"
     th:attr="sse-connect=@{/api/retro/{retroId}/events(retroId=${retroId})}">
  <h2 class="text-2xl font-dosis mb-6">Session Lobby</h2>

  <!-- Session ID display with copy button -->
  <div class="mb-6 p-4 bg-gray-50 rounded-md flex items-center justify-between">
    <div>
      <span class="text-gray-600">Session ID:</span>
      <span id="session-id" th:text="${retroId}" class="font-mono text-ocher-yellow ml-2"></span>
    </div>
    <button class="px-3 py-1 text-sm bg-ocher-yellow text-white rounded hover:bg-ocher-yellow-dark transition-colors"
      onclick="navigator.clipboard.writeText(document.getElementById('session-id').innerText)">
      Copy
    </button>
  </div>

  <!-- Participants list that auto-updates with new participants -->
  <div class="participants mb-8">
    <h3 class="text-xl font-dosis mb-4">Participants</h3>
    <ul id="participants-list" class="space-y-2"
        th:attr="hx-get=@{retro/{retroId}/participants(retroId=${retroId})}"
        hx-trigger="participant-joined from:body, refresh"
        hx-swap="innerHTML">
      <li th:each="participant : ${participants}" class="px-4 py-2 bg-gray-50 rounded-md flex justify-between items-center">
        <span th:text="${participant.displayName}"></span>
        <span th:if="${participant.role.name() == 'FACILITATOR'}" 
              class="ml-2 text-xs bg-ocher-yellow text-white px-2 py-1 rounded">
          Facilitator
        </span>
      </li>
    </ul>
  </div>

  <!-- Start button (facilitator only) -->
  <div th:if="${isFacilitator}" class="mt-8">
    <form th:attr="hx-post=@{/api/retro/{retroId}/start(retroId=${retroId})}">
      <button type="submit"
        class="w-full bg-ocher-yellow text-white py-3 px-6 rounded-md hover:bg-ocher-yellow-dark transition-colors">
        Start Retrospective
      </button>
    </form>
  </div>

  <!-- Connection status indicator -->
  <div class="mt-4 flex items-center space-x-2">
    <div id="connection-status" 
         class="h-3 w-3 rounded-full bg-yellow-500 animate-pulse">
    </div>
    <span id="connection-text" class="text-sm">Connecting...</span>
  </div>
  
  <!-- Simple event log for debugging -->
  <div class="mt-4 p-2 bg-gray-100 rounded-md text-xs">
    <details>
      <summary class="font-semibold cursor-pointer">Debug: Event Log</summary>
      <div id="event-log" class="mt-2 max-h-32 overflow-y-auto space-y-1 font-mono"></div>
    </details>
  </div>

  <!-- HTMX SSE Event Handlers (No JavaScript!) -->
  
  <!-- Handle participant-joined events -->
  <div sse-swap="participant-joined" 
       hx-trigger="sse:participant-joined"
       hx-target="#participants-list"
       th:attr="hx-get=@{/retro/{retroId}/participants(retroId=${retroId})}"
       hx-swap="innerHTML"></div>
  
  <!-- Handle session-started events -->
  <div sse-swap="session-started" 
       hx-trigger="sse:session-started"
       th:attr="hx-get=@{/retro/{retroId}(retroId=${retroId})}"
       hx-push-url="true"
       hx-target="body"
       hx-swap="outerHTML"></div>
  
  <!-- Enhanced debugging with both hyperscript and JavaScript fallback -->
  <div _="on htmx:sseConnecting from body
            remove .bg-green-500 from #connection-status
            remove .bg-red-500 from #connection-status  
            add .bg-yellow-500 to #connection-status
            add .animate-pulse to #connection-status
            put 'Connecting...' into #connection-text
            call addEventLog('HTMX SSE Connecting...')
            
          on htmx:sseOpen from body
            remove .bg-yellow-500 from #connection-status
            remove .animate-pulse from #connection-status
            remove .bg-red-500 from #connection-status
            add .bg-green-500 to #connection-status
            put 'Connected' into #connection-text
            call addEventLog('HTMX SSE Connected')
            
          on htmx:sseError from body
            remove .bg-yellow-500 from #connection-status
            remove .animate-pulse from #connection-status
            remove .bg-green-500 from #connection-status
            add .bg-red-500 to #connection-status
            put 'Connection Error' into #connection-text
            call addEventLog('HTMX SSE Error')
            
          on htmx:sseClose from body
            remove .bg-yellow-500 from #connection-status
            remove .animate-pulse from #connection-status
            remove .bg-green-500 from #connection-status
            add .bg-red-500 to #connection-status
            put 'Disconnected' into #connection-text
            call addEventLog('HTMX SSE Closed')
            
          on sse:participant-joined from body
            call addEventLog('Event: participant-joined')
            
          on sse:session-started from body  
            call addEventLog('Event: session-started')"></div>

  <!-- JavaScript debugging fallback -->
  <script>
    let eventSource = null;
    
    // Enhanced debugging
    function addEventLog(message) {
      const logDiv = document.getElementById('event-log');
      const timestamp = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.textContent = `${timestamp}: ${message}`;
      entry.className = 'text-xs text-gray-600';
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }
    
    // Pure JavaScript SSE implementation (fallback for HTMX extension issues)
    function setupJavaScriptSSE() {
      const sseDiv = document.querySelector('[sse-connect]');
      const sseUrl = sseDiv ? sseDiv.getAttribute('sse-connect') : null;
      
      if (!sseUrl) {
        addEventLog('ERROR: No SSE URL found');
        return;
      }
      
      addEventLog('Starting JavaScript SSE connection to: ' + sseUrl);
      updateConnectionStatus('connecting');
      
      eventSource = new EventSource(sseUrl);
      
      eventSource.onopen = function() {
        addEventLog('JavaScript SSE: Connection opened');
        updateConnectionStatus('connected');
      };
      
      eventSource.onerror = function(event) {
        addEventLog('JavaScript SSE: Error occurred');
        updateConnectionStatus('error');
      };
      
      eventSource.onmessage = function(event) {
        addEventLog('JavaScript SSE: Raw message - ' + event.data);
      };
      
      // Handle custom event types
      eventSource.addEventListener('participant_joined', function(event) {
        addEventLog('JavaScript SSE: participant_joined - ' + event.data);
        try {
          const data = JSON.parse(event.data);
          // Trigger HTMX refresh for participants list
          if (typeof htmx !== 'undefined') {
            const participantsList = document.getElementById('participants-list');
            if (participantsList) {
              htmx.trigger(participantsList, 'refresh');
            }
          }
        } catch (e) {
          addEventLog('ERROR parsing participant_joined data: ' + e.message);
        }
      });
      
      eventSource.addEventListener('session_started', function(event) {
        addEventLog('JavaScript SSE: session_started - ' + event.data);
        try {
          const data = JSON.parse(event.data);
          // Trigger full page refresh for session start
          if (typeof htmx !== 'undefined') {
            window.location.reload();
          }
        } catch (e) {
          addEventLog('ERROR parsing session_started data: ' + e.message);
        }
      });
      
      // Handle keep-alive events (don't log these as they're frequent)
      eventSource.addEventListener('keep-alive', function(event) {
        // Silent keep-alive - just maintain connection
        // addEventLog('JavaScript SSE: keep-alive received'); // Uncomment for debugging
      });
    }
    
    // Direct SSE debugging - fallback if HTMX events don't fire
    document.addEventListener('DOMContentLoaded', function() {
      addEventLog('DOM loaded, checking SSE setup...');
      
      // Check if the SSE extension loaded
      if (typeof htmx !== 'undefined' && htmx.config) {
        addEventLog('HTMX loaded successfully (version: ' + (htmx.version || 'unknown') + ')');
      } else {
        addEventLog('WARNING: HTMX not found');
      }
      
      // Check HTMX extensions
      const extensions = typeof htmx !== 'undefined' && htmx._extensions ? Object.keys(htmx._extensions) : [];
      if (extensions.length > 0) {
        addEventLog('HTMX extensions loaded: ' + extensions.join(', '));
      } else {
        addEventLog('No HTMX extensions loaded - using JavaScript SSE fallback');
        setupJavaScriptSSE();
      }
      
      // Listen for HTMX SSE events (if extension works)
      document.body.addEventListener('htmx:sseConnecting', function() {
        addEventLog('HTMX SSE: Connecting...');
      });
      
      document.body.addEventListener('htmx:sseOpen', function() {
        addEventLog('HTMX SSE: Connected!');
        updateConnectionStatus('connected');
      });
      
      document.body.addEventListener('htmx:sseError', function(evt) {
        addEventLog('HTMX SSE: Error - ' + (evt.detail ? evt.detail : 'Unknown'));
        updateConnectionStatus('error');
      });
      
      document.body.addEventListener('htmx:sseClose', function() {
        addEventLog('HTMX SSE: Closed');  
        updateConnectionStatus('disconnected');
      });
      
      // Timeout check - if still connecting after 10 seconds, force JavaScript SSE
      setTimeout(function() {
        const statusText = document.getElementById('connection-text').textContent;
        if (statusText === 'Connecting...') {
          addEventLog('WARNING: Still connecting after 10 seconds - trying JavaScript SSE fallback');
          setupJavaScriptSSE();
        }
      }, 10000);
    });
    
    function updateConnectionStatus(status) {
      const statusDiv = document.getElementById('connection-status');
      const textDiv = document.getElementById('connection-text');
      
      // Remove all status classes
      statusDiv.classList.remove('bg-yellow-500', 'bg-green-500', 'bg-red-500', 'animate-pulse');
      
      switch(status) {
        case 'connected':
          statusDiv.classList.add('bg-green-500');
          textDiv.textContent = 'Connected';
          break;
        case 'error':
          statusDiv.classList.add('bg-red-500');
          textDiv.textContent = 'Connection Error';
          break;
        case 'disconnected':
          statusDiv.classList.add('bg-red-500');
          textDiv.textContent = 'Disconnected';
          break;
        default:
          statusDiv.classList.add('bg-yellow-500', 'animate-pulse');
          textDiv.textContent = 'Connecting...';
      }
    }
  </script>

</div>
