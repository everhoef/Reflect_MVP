<div th:fragment="content">
  <div class="max-w-4xl mx-auto" hx-sse="connect:/retrospective/{retroId}/events">
    <h2 class="text-2xl font-dosis mb-6">Retrospective Session</h2>

    <div id="currentPage" class="bg-white p-8 rounded-lg shadow-md mb-6" hx-sse="swap:message[type='PAGE_CHANGE']">
      <!-- Dynamic content will be loaded here -->
    </div>

    <div th:if="${isFacilitator}" class="facilitator-controls fixed bottom-8 right-8">
      <button hx-post="@{/retrospective/{retroId}/next(retroId=${retroId})}"
        class="bg-ocher-yellow text-white py-3 px-6 rounded-md hover:bg-ocher-yellow-dark transition-colors shadow-lg">
        Next Page
      </button>
    </div>
  </div>
</div>
