<header th:fragment="header" class="bg-white shadow-md">
    <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
        <a href="/" class="text-2xl font-dosis font-medium text-ocher-yellow">Retro App</a>
        <div class="flex items-center gap-4">
            
            <!-- Authentication UI -->
            <div class="flex items-center gap-2">
                <!-- Guest user display with upgrade option -->
                <div sec:authorize="isAuthenticated()" th:if="${#strings.contains(#authentication.authorities, 'ROLE_GUEST')}" class="flex items-center gap-2">
                    <span class="text-aging-grey font-semibold">
                        <span th:text="${#authentication.getName()}"></span>
                        <span class="text-xs text-gray-500">(Guest)</span>
                    </span>
                    <a th:href="@{/login}" 
                       class="px-3 py-1 text-xs bg-blue-500 text-white rounded-md hover:bg-blue-600 transition duration-300">
                       Create Account
                    </a>
                </div>
                
                <!-- Authenticated user display -->
                <div sec:authorize="isAuthenticated()" th:if="${#strings.contains(#authentication.authorities, 'ROLE_USER')}" class="flex items-center gap-2">
                    <span class="text-aging-grey font-semibold">
                        <span th:text="${#authentication.getName()}"></span>
                    </span>
                    <form th:action="@{/logout}" method="post" class="inline">
                        <button type="submit" 
                                class="text-aging-grey hover:text-ocher-yellow transition duration-300 bg-transparent border-none cursor-pointer">
                            Logout
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>
</header>
