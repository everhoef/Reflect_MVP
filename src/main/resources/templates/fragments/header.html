<header th:fragment="header" class="bg-white shadow-md">
    <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
        <a href="/" class="text-2xl font-dosis font-medium text-ocher-yellow">Retro App</a>
        <div class="flex items-center gap-4">
            
            <!-- Authentication UI -->
            <div class="flex items-center gap-2">
                <span sec:authorize="isAuthenticated()" class="text-aging-grey font-semibold">
                    <span th:text="${#authentication.getName()}"></span>
                </span>
                <a sec:authorize="isAuthenticated()" th:href="@{/logout}"
                   class="text-aging-grey hover:text-ocher-yellow transition duration-300">Logout</a>
                
                <!-- When anonymous show login button -->
                <a th:if="${#authentication == null || #authentication.principal == 'anonymousUser'}" 
                   th:href="@{/login}"
                   class="text-aging-grey hover:text-ocher-yellow transition duration-300">Login</a>
            </div>
        </div>
    </nav>
</header>
