<!-- SSE event logging for testing/debugging -->
<!-- HTMX handles reconnection automatically with exponential backoff -->
<script th:fragment="sse-handlers">
    (function() {
        'use strict';

        document.body.addEventListener('htmx:sseOpen', function(evt) {
            console.log('SSE OPEN');
        });

        document.body.addEventListener('htmx:sseError', function(evt) {
            console.warn('SSE ERROR');
        });

        document.body.addEventListener('htmx:sseClose', function(evt) {
            console.log('SSE CLOSE');
        });

        // Log ALL SSE messages before swap (catches all events, even those without targets)
        // evt.detail is a MessageEvent object from EventSource
        document.body.addEventListener('htmx:sseBeforeMessage', function(evt) {
            console.log('htmx:sseBeforeMessage fired');
            console.log('evt.detail type:', typeof evt.detail);
            console.log('evt.detail:', JSON.stringify(evt.detail));

            const messageEvent = evt.detail;
            console.log('SSE EVENT: ' + messageEvent.type + ' | data: ' + messageEvent.data);
        });

        console.log('SSE handlers initialized');
    })();
</script>
