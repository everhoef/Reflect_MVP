<!-- SSE event logging for testing/debugging -->
<!-- HTMX handles reconnection automatically with exponential backoff -->
<script th:fragment="sse-handlers">
    (function() {
        'use strict';

        // Connection lifecycle logging
        document.body.addEventListener('htmx:sseOpen', function(evt) {
            console.log('[SSE] Connection opened');
            window.eventSource = evt.detail.source;
        });

        document.body.addEventListener('htmx:sseError', function(evt) {
            console.error('[SSE] Connection error:', evt.detail?.error || 'Unknown error');
        });

        document.body.addEventListener('htmx:sseClose', function(evt) {
            console.log('[SSE] Connection closed, type:', evt.detail?.type || 'unknown');
            window.eventSource = null;
        });

        // Log ALL SSE messages with correlation ID extracted from lastEventId
        document.body.addEventListener('htmx:sseBeforeMessage', function(evt) {
            // evt.detail is the MessageEvent from EventSource
            const messageEvent = evt.detail;

            // Extract correlation ID from SSE event ID (server sets via .id() method)
            const correlationId = messageEvent.lastEventId || 'no-id';
            const eventType = messageEvent.type;
            const eventData = messageEvent.data;

            console.log(`[${correlationId}] SSE event received: ${eventType} | data: ${eventData}`);
        });

        // Log HTMX triggers caused by SSE events
        document.body.addEventListener('htmx:trigger', function(evt) {
            const triggerSpec = evt.detail?.elt?.getAttribute('hx-trigger');
            if (triggerSpec && triggerSpec.includes('sse:')) {
                const elementId = evt.detail.elt.id || evt.detail.elt.getAttribute('class') || evt.detail.elt.tagName;
                console.log('[htmx-trigger] HTMX trigger:', triggerSpec, '→', elementId);
            }
        });

        // Log component refresh requests
        document.body.addEventListener('htmx:beforeRequest', function(evt) {
            const triggerSpec = evt.detail?.elt?.getAttribute('hx-trigger');
            if (triggerSpec && triggerSpec.includes('sse:')) {
                const url = evt.detail.pathInfo?.requestPath || 'unknown-url';
                const elementId = evt.detail.elt.id || evt.detail.elt.getAttribute('class') || evt.detail.elt.tagName;
                console.log('[htmx-request] Component refresh started:', elementId, '→', url);
            }
        });

        // Log component refresh responses
        document.body.addEventListener('htmx:afterRequest', function(evt) {
            const triggerSpec = evt.detail?.elt?.getAttribute('hx-trigger');
            if (triggerSpec && triggerSpec.includes('sse:')) {
                const elementId = evt.detail.elt.id || evt.detail.elt.getAttribute('class') || evt.detail.elt.tagName;
                const successful = evt.detail.successful;
                const status = evt.detail.xhr?.status || 'unknown';
                console.log('[htmx-response] Component refresh ' + (successful ? 'succeeded' : 'failed') + ':', elementId, `(HTTP ${status})`);
            }
        });

        // Log DOM swaps
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            const triggerSpec = evt.detail?.elt?.getAttribute('hx-trigger');
            if (triggerSpec && triggerSpec.includes('sse:')) {
                const elementId = evt.detail.elt.id || evt.detail.elt.getAttribute('class') || evt.detail.elt.tagName;
                console.log('[htmx-swap] Component DOM updated:', elementId);
            }
        });

        console.log('[SSE] Event handlers initialized');
    })();
</script>
