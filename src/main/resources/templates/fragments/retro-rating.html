<div th:fragment="content" class="space-y-6">
    <!-- Rating activity using simplified templateData.activityData -->
    <div th:if="${templateData.activityData != null and templateData.activityData.ratingData != null}" 
         th:with="rating=${templateData.activityData.ratingData}">
        
        <!-- Rating Input Section -->
        <div class="bg-white p-8 rounded-lg border text-center">
            <form th:attr="hx-post=@{/api/retro/{retroId}/step/{stepId}/rating(retroId=${templateData.retroId}, stepId=${templateData.currentStep.id})}"
                  hx-swap="none" 
                  hx-trigger="submit"
                  class="space-y-6">
                
                <!-- Simple 1-10 Rating Scale -->
                <div class="flex justify-center space-x-3">
                    <div th:each="i : ${#numbers.sequence(1, 10, 1)}" 
                         class="flex flex-col items-center">
                        <input type="radio" 
                               name="rating" 
                               th:value="${i}" 
                               th:id="'rating-' + ${i}"
                               class="mb-2 w-5 h-5 text-blue-600 scale-125" 
                               required>
                        <label th:for="'rating-' + ${i}" 
                               class="text-lg font-bold cursor-pointer hover:text-blue-600 transition-colors px-2 py-1 rounded" 
                               th:text="${i}">1</label>
                    </div>
                </div>
                
                <!-- Scale Info -->
                <div class="text-xs text-gray-500">
                    <p>Scale: 1 (low) to 10 (high)</p>
                </div>
                
                <!-- Optional Comment -->
                <div th:if="${rating.allowComment}" class="text-left">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Why did you choose this rating? (optional)
                    </label>
                    <textarea name="comment" 
                              class="w-full p-3 border border-gray-300 rounded-md resize-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                              rows="2" 
                              placeholder="Share your reasoning..."></textarea>
                </div>
                
                <button type="submit" 
                        class="bg-blue-600 text-white py-3 px-8 rounded-md hover:bg-blue-700 transition-colors font-medium">
                    Submit My Rating
                </button>
            </form>
        </div>
        
        <!-- Rating Responses -->
        <div class="bg-gray-50 p-6 rounded-lg" th:id="'rating-responses'">
            <div class="text-center text-gray-500">
                <div class="mb-4">📊</div>
                <p>Rating responses will appear here via live updates</p>
            </div>
        </div>
    </div>
    
    <!-- Fallback if no activity data -->
    <div th:unless="${templateData.activityData != null and templateData.activityData.ratingData != null}" 
         class="text-center py-8 text-gray-500">
        <p>No rating activity configuration available.</p>
    </div>
    
    <!-- Facilitator Controls -->
    <div th:if="${templateData.isFacilitator}" class="flex justify-center pt-4 border-t">
        <button class="bg-ocher-yellow text-white px-6 py-2 rounded-md hover:bg-ocher-yellow-dark transition-colors"
                th:attr="hx-post=@{/api/retro/{retroId}/step/{stepId}/reveal(retroId=${templateData.retroId}, stepId=${templateData.currentStep.id})}"
                hx-swap="none">
            📈 Show Histogram
        </button>
    </div>
</div>
