<div th:fragment="content" class="space-y-6">
    <!-- Rating activity - generic for any rating scale -->
    <div th:if="${currentStep != null and currentStep.dataPattern?.name() == 'RATING'}"
         th:with="config=${currentStep.config},
                  scaleConfig=${config.scale},
                  minRating=${scaleConfig?.min != null ? scaleConfig.min : 1},
                  maxRating=${scaleConfig?.max != null ? scaleConfig.max : 10},
                  scaleStep=${scaleConfig?.step != null ? scaleConfig.step : 1},
                  labels=${config.labels}">

        <!-- Rating Input Section -->
        <div class="bg-white p-8 rounded-lg border text-center">
            <form th:attr="hx-post=@{/api/retro/{retroId}/step/{stepId}/response(retroId=${retroSession.id}, stepId=${currentStep.id})}"
                  hx-swap="none"
                  hx-trigger="submit"
                  class="space-y-6">

                <!-- Generic Rating Scale (reads from configuration) -->
                <div class="flex justify-center space-x-3">
                    <div th:each="i : ${#numbers.sequence(minRating, maxRating, scaleStep)}"
                         class="flex flex-col items-center">
                        <input type="radio"
                               name="rating"
                               th:value="${i}"
                               th:id="'rating-' + ${i}"
                               class="mb-2 w-5 h-5 text-blue-600 scale-125"
                               required>
                        <label th:for="'rating-' + ${i}"
                               class="text-lg font-bold cursor-pointer hover:text-blue-600 transition-colors px-2 py-1 rounded"
                               th:text="${i}">1</label>
                    </div>
                </div>

                <!-- Scale Info with labels from configuration -->
                <div class="text-xs text-gray-500" th:if="${labels != null and #lists.size(labels) >= 2}">
                    <p><span th:text="${labels[0]}">Low</span> (<span th:text="${minRating}">1</span>) to <span th:text="${labels[1]}">High</span> (<span th:text="${maxRating}">10</span>)</p>
                </div>
                <div class="text-xs text-gray-500" th:unless="${labels != null and #lists.size(labels) >= 2}">
                    <p>Scale: <span th:text="${minRating}">1</span> (low) to <span th:text="${maxRating}">10</span> (high)</p>
                </div>
                
                <!-- Optional Comment -->
                <div th:if="${config.allowComment}" class="text-left">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Why did you choose this rating? (optional)
                    </label>
                    <textarea name="comment" 
                              class="w-full p-3 border border-gray-300 rounded-md resize-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                              rows="2" 
                              placeholder="Share your reasoning..."></textarea>
                </div>
                
                <button type="submit" 
                        class="bg-blue-600 text-white py-3 px-8 rounded-md hover:bg-blue-700 transition-colors font-medium">
                    Submit My Rating
                </button>
            </form>
        </div>
        
        <!-- Rating Responses Histogram -->
        <div class="bg-gray-50 p-6 rounded-lg"
             th:id="'rating-responses-' + ${currentStep.id}"
             th:attr="hx-get=@{/retro/{retroId}/step/{stepId}/histogram(retroId=${retroSession.id}, stepId=${currentStep.id})}"
             hx-trigger="load, sse:note_added from:body, sse:note_updated from:body"
             hx-swap="innerHTML"
             hx-target="this">
            <div class="text-center text-gray-500">
                <div class="mb-4">📊</div>
                <p>Histogram will appear here when responses are submitted</p>
            </div>
        </div>
    </div>
    
    <!-- Fallback if no activity data -->
    <div th:unless="${currentStep != null and currentStep.dataPattern?.name() == 'RATING'}" 
         class="text-center py-8 text-gray-500">
        <p>No rating activity configuration available.</p>
    </div>
    
    <!-- Facilitator Controls -->
    <div th:if="${isFacilitator}" class="flex justify-center pt-4 border-t">
        <button class="bg-ocher-yellow text-white px-6 py-2 rounded-md hover:bg-ocher-yellow-dark transition-colors"
                th:attr="hx-post=@{/api/retro/{retroId}/step/{stepId}/reveal(retroId=${retroSession.id}, stepId=${currentStep.id})}"
                hx-swap="none">
            👁️ Reveal All Responses
        </button>
    </div>
</div>

<!-- Histogram Fragment (loaded via HTMX) -->
<div th:fragment="histogram" class="space-y-4">
    <h3 class="text-lg font-semibold text-gray-700">Rating Distribution</h3>

    <div th:if="${responses.empty}" class="text-center text-gray-500 py-8">
        <div class="mb-2">📊</div>
        <p>No ratings submitted yet</p>
    </div>

    <div th:unless="${totalResponses == 0}" class="space-y-2">
        <div th:if="${responses.empty}" class="text-center text-gray-500 py-4">
            <p th:text="${totalResponses} + ' response(s) submitted (hidden until revealed)'">Responses hidden</p>
        </div>

        <div th:unless="${responses.empty}">
            <p class="text-sm text-gray-600 mb-4">
                <span th:text="${responses.size()}">0</span> rating(s) submitted
            </p>

            <!-- Simple SVG Histogram -->
            <div th:each="rating : ${#numbers.sequence(minRating, maxRating, 1)}">
                <!-- Count responses with this rating using server-side calculation -->
                <div th:with="count=${#aggregates.sum(responses.![rating == __${rating}__ ? 1 : 0])}"
                     class="flex items-center space-x-2">
                    <span class="w-8 text-right font-medium" th:text="${rating}">1</span>
                    <div class="flex-1 bg-gray-200 rounded h-8 relative overflow-hidden">
                        <div class="bg-blue-500 h-full rounded transition-all duration-300"
                             th:style="'width: ' + ${count > 0 and !responses.empty ? (count * 100.0 / responses.size()) : 0} + '%'"></div>
                        <span class="absolute inset-0 flex items-center justify-center text-xs font-semibold"
                              th:if="${count > 0}"
                              th:text="${count}">0</span>
                    </div>
                </div>
            </div>

            <!-- Comments Section -->
            <div th:if="${!responses.empty}"
                 th:with="hasComments=${#aggregates.sum(responses.![comment != null and !comment.isBlank() ? 1 : 0]) > 0}">
                <div th:if="${hasComments}" class="mt-6 space-y-2">
                    <h4 class="font-semibold text-gray-700">Comments:</h4>
                    <div th:each="response : ${responses}"
                         th:if="${response.comment != null and !response.comment.isBlank()}"
                         class="bg-white p-3 rounded border">
                        <div class="flex items-start space-x-2">
                            <span class="font-bold text-blue-600" th:text="${response.rating}">0</span>
                            <p class="text-gray-700 text-sm" th:text="${response.comment}">Comment</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Histogram Error Fragment -->
<div th:fragment="histogram-error" class="text-center text-red-500 py-4">
    <p>Error loading histogram</p>
</div>
