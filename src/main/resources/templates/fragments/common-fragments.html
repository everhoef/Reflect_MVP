<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<!-- Generic Error Fragment -->
<div th:fragment="error" class="text-center text-red-500 py-8">
    <p class="text-2xl mb-2">⚠️</p>
    <p class="font-semibold">Error loading content</p>
    <p class="text-sm text-gray-500 mt-2">Please try refreshing the page</p>
</div>

<!-- Loading Placeholder Fragment -->
<div th:fragment="loading" class="text-center text-gray-400 py-8">
    <p class="text-2xl mb-2">⏳</p>
    <p>Loading...</p>
</div>

</body>
</html>
