<div th:fragment="content" class="bg-blue-50 p-6 rounded-lg border-l-4 border-blue-400">
    <div class="flex items-start">
        <div class="flex-shrink-0">
            <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center">
                <span class="text-white font-bold text-sm">ℹ️</span>
            </div>
        </div>
        <div class="ml-4 flex-1">
            <h4 class="text-lg font-semibold text-blue-900 mb-3">Instructions</h4>
            <div class="prose prose-blue text-blue-800" th:utext="${templateData.currentStep != null ? (templateData.currentStep.parsedContent ?: templateData.currentStep.configuration) : 'No step content available'}">
                Step instructions will appear here...
            </div>
        </div>
    </div>
</div>
