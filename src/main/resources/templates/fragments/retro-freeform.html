<div th:fragment="content" class="space-y-6">
    <!-- Freeform activity using simplified templateData.activityData -->
    <div th:if="${currentStep != null and currentStep.dataPattern?.name() == 'FREEFORM'}" 
         th:with="config=${currentStep.config}">
        
        <!-- Freeform Input Section -->
        <div class="bg-white p-6 rounded-lg border">
            <form th:attr="hx-post=@{/api/retro/{retroId}/step/{stepId}/freeform(retroId=${session.id}, stepId=${currentStep.id})}"
                  hx-swap="none" 
                  hx-trigger="submit"
                  class="space-y-4">
                
                <!-- Prompt Display -->
                <div class="text-center mb-6">
                    <h4 class="text-lg font-medium text-gray-900 mb-2" th:text="${config.prompt}">What's your response?</h4>
                </div>
                
                <!-- Text Input -->
                <div>
                    <textarea name="content"
                              class="w-full p-4 border border-gray-300 rounded-md resize-none focus:ring-2 focus:ring-purple-500 focus:border-transparent text-lg"
                              th:rows="${config.maxLength <= 100} ? 2 : ${config.maxLength <= 300} ? 4 : 6"
                              required
                              th:maxlength="${config.maxLength}"
                              th:placeholder="${config.prompt}"></textarea>
                    
                    <!-- Character counter -->
                    <div class="flex justify-between items-center mt-2 text-sm text-gray-500">
                        <span th:if="${config.allowMultiple}" class="text-blue-600">
                            💡 You can submit multiple responses
                        </span>
                        <span th:text="'Max ' + ${config.maxLength} + ' characters'">Max 500 characters</span>
                    </div>
                </div>
                
                <div class="text-right">
                    <button type="submit" 
                            class="bg-purple-600 text-white py-3 px-6 rounded-md hover:bg-purple-700 transition-colors font-medium">
                        <span th:text="${config.allowMultiple} ? 'Add Response' : 'Submit Response'">Add Response</span>
                    </button>
                </div>
            </form>
        </div>
        
        <!-- Response Wall -->
        <div class="bg-gray-50 p-6 rounded-lg" th:id="'freeform-responses'">
            <div class="text-center text-gray-500">
                <div class="mb-2">💭</div>
                <p>Responses will appear here via live updates...</p>
                <p class="text-xs mt-1" th:if="${config.allowMultiple}">Multiple responses per person allowed</p>
            </div>
        </div>
        
        <!-- Configuration Info -->
        <div class="text-center text-xs text-gray-500">
            <p th:text="'Response limit: ' + ${config.maxLength} + ' characters' + 
                       (${config.allowMultiple} ? ' • Multiple responses allowed' : ' • One response per person')">
                Response limit: 500 characters • Multiple responses allowed
            </p>
        </div>
    </div>
    
    <!-- Fallback if no activity data -->
    <div th:unless="${currentStep != null and currentStep.dataPattern?.name() == 'FREEFORM'}" 
         class="text-center py-8 text-gray-500">
        <p>No freeform activity configuration available.</p>
    </div>
    
    <!-- Facilitator Controls -->
    <div th:if="${isFacilitator}" class="flex justify-center pt-4 border-t">
        <button class="bg-ocher-yellow text-white px-6 py-2 rounded-md hover:bg-ocher-yellow-dark transition-colors"
                th:attr="hx-post=@{/api/retro/{retroId}/step/{stepId}/reveal(retroId=${session.id}, stepId=${currentStep.id})}"
                hx-swap="none">
            👁️ Reveal All Responses
        </button>
    </div>
</div>
