<div th:fragment="content" class="space-y-2">
    <div th:if="${actionItems.empty}" class="text-center text-gray-400 text-sm py-4">
        <p>No action items yet.</p>
    </div>

    <div th:each="item : ${actionItems}"
         class="bg-white border border-gray-200 rounded-lg p-3 shadow-sm">
        <p class="text-sm font-medium text-gray-800" th:text="${item.what}">What</p>
        <div class="flex flex-wrap gap-3 mt-2 text-xs text-gray-500">
            <span th:if="${item.assignedToDisplayName != null}">
                👤 <span th:text="${item.assignedToDisplayName}">Assignee</span>
            </span>
            <span th:if="${item.whenDate != null}">
                📅 <span th:text="${#temporals.format(item.whenDate, 'dd MMM yyyy')}">Date</span>
            </span>
        </div>
        <p th:if="${item.successCriteria != null}" class="text-xs text-gray-500 mt-1">
            ✓ <span th:text="${item.successCriteria}">Criteria</span>
        </p>
    </div>
</div>
