<div th:fragment="content" class="space-y-6"
     th:with="config=${currentStep.componentConfig},
              minRating=${config.min != null ? config.min : 1},
              maxRating=${config.max != null ? config.max : 10},
              scaleStep=${config.step != null ? config.step : 1},
              labels=${config.labels}">

    <!-- Rating Input Section -->
    <div class="bg-white p-8 rounded-lg border text-center">
        <form th:attr="hx-post=@{/api/retro/{retroId}/step/{stepId}/response/rating(retroId=${retroSession.id}, stepId=${currentStep.id})}"
              hx-swap="none"
              hx-trigger="submit"
              class="space-y-6">

            <!-- Rating Scale -->
            <div class="flex justify-center space-x-3">
                <div th:each="i : ${#numbers.sequence(minRating, maxRating, scaleStep)}"
                     class="flex flex-col items-center">
                    <input type="radio"
                           name="rating"
                           th:value="${i}"
                           th:id="'rating-' + ${i}"
                           class="mb-2 w-5 h-5 text-blue-600 scale-125"
                           required>
                    <label th:for="'rating-' + ${i}"
                           class="text-lg font-bold cursor-pointer hover:text-blue-600 transition-colors px-2 py-1 rounded"
                           th:text="${i}">1</label>
                </div>
            </div>

            <!-- Scale Labels -->
            <div class="text-xs text-gray-500" th:if="${labels != null and #lists.size(labels) >= 2}">
                <p><span th:text="${labels[0]}">Low</span> (<span th:text="${minRating}">1</span>) to <span th:text="${labels[1]}">High</span> (<span th:text="${maxRating}">10</span>)</p>
            </div>
            <div class="text-xs text-gray-500" th:unless="${labels != null and #lists.size(labels) >= 2}">
                <p>Scale: <span th:text="${minRating}">1</span> (low) to <span th:text="${maxRating}">10</span> (high)</p>
            </div>

            <!-- Optional Comment -->
            <div th:if="${config.allowComment}" class="text-left">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Why did you choose this rating? (optional)
                </label>
                <textarea name="comment"
                          class="w-full p-3 border border-gray-300 rounded-md resize-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                          rows="2"
                          th:maxlength="${config.capabilities != null && config.capabilities.maxLength != null ? config.capabilities.maxLength : 500}"
                          placeholder="Share your reasoning..."></textarea>
            </div>

            <button type="submit"
                    class="bg-blue-600 text-white py-3 px-8 rounded-md hover:bg-blue-700 transition-colors font-medium">
                Submit My Rating
            </button>
        </form>
    </div>
</div>
