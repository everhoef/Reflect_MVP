<div th:fragment="content" class="space-y-6"
     th:with="config=${currentStep.componentConfig}">

    <!-- Histogram Container (HTMX-powered auto-refresh) -->
    <div class="bg-white p-6 rounded-lg border">
        <h3 class="text-xl font-semibold mb-6 text-center">Rating Distribution</h3>

        <div th:id="'histogram-container-' + ${currentStep.id}"
             th:attr="hx-get=@{/retro/{r}/step/{s}/histogram(r=${retroSession.id}, s=${currentStep.id})}"
             hx-trigger="load, sse:response_submitted from:body, sse:responses_revealed from:body"
             hx-swap="innerHTML"
             hx-target="this">
            <p class="text-center text-gray-400">Loading histogram...</p>
        </div>
    </div>
</div>

<!-- Histogram Data Fragment (loaded via HTMX) -->
<div th:fragment="histogram-data" class="space-y-4">
    <!-- No responses yet -->
    <div th:if="${totalResponses == 0}" class="text-center text-gray-500 py-8">
        <div class="mb-2">📊</div>
        <p class="text-sm">Waiting for participants to submit ratings...</p>
    </div>

    <!-- Responses submitted but hidden -->
    <div th:if="${totalResponses > 0 and responses.empty}" class="text-center text-gray-500 py-8">
        <div class="mb-2">📊</div>
        <p class="font-medium" th:text="${totalResponses} + ' ' + (${totalResponses == 1} ? 'person has' : 'people have') + ' responded'">0 people have responded</p>
        <p class="text-sm mt-2">Results will be shown when facilitator advances</p>
    </div>

    <!-- Responses revealed -->
    <div th:if="${!responses.empty}" class="space-y-4">
        <p class="text-sm text-gray-600">
            <span th:text="${responses.size()}">0</span> rating(s) submitted
        </p>

        <!-- Histogram Bars -->
        <div th:each="rating : ${#numbers.sequence(minRating, maxRating, 1)}"
             th:with="count=${#aggregates.sum(responses.![rating == __${rating}__ ? 1 : 0])}">
            <div class="flex items-center space-x-2">
                <span class="w-8 text-right font-medium" th:text="${rating}">1</span>
                <div class="flex-1 bg-gray-200 rounded h-8 relative overflow-hidden">
                    <div class="bg-blue-500 h-full rounded transition-all duration-300"
                         th:style="'width: ' + ${count > 0 ? (count * 100.0 / responses.size()) : 0} + '%'"></div>
                    <span class="absolute inset-0 flex items-center justify-center text-xs font-semibold"
                          th:if="${count > 0}"
                          th:text="${count}">0</span>
                </div>
            </div>
        </div>

        <!-- Comments Section -->
        <div th:if="${showComments}" th:with="hasComments=${#aggregates.sum(responses.![comment != null and !comment.isBlank() ? 1 : 0]) > 0}">
            <div th:if="${hasComments}" class="mt-6 space-y-2">
                <h4 class="font-semibold text-gray-700">Comments:</h4>
                <div th:each="response : ${responses}"
                     th:if="${response.comment != null and !response.comment.isBlank()}"
                     class="bg-white p-3 rounded border">
                    <div class="flex items-start space-x-2">
                        <span class="font-bold text-blue-600" th:text="${response.rating}">0</span>
                        <p class="text-gray-700 text-sm" th:text="${response.comment}">Comment</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
