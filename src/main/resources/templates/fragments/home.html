<div th:fragment="content">
    <h1 class="text-3xl font-dosis font-medium mb-6 text-center text-ocher-yellow">Team Retrospective</h1>
    <div class="bg-white p-8 rounded-lg shadow-md max-w-md mx-auto">
        <div class="space-y-4">
            <div sec:authorize="isAuthenticated()" class="text-center mb-4">
                <p>Welcome, <span sec:authentication="name" class="font-semibold"></span>!</p>
            </div>

            <div class="create-session">
                <h2 class="text-xl font-dosis mb-4">Create New Retrospective</h2>
                <form hx-post="/api/retro/create"
                      hx-headers='{"Content-Type": "application/json"}'
                      hx-ext="json-enc"
                      class="space-y-3">
                    <div th:if="${#authentication == null || #authentication.principal == 'anonymousUser'}" class="space-y-2">
                        <input type="text" name="displayName" placeholder="Your name" required
                            class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-ocher-yellow">
                    </div>
                    <input type="text" name="sessionName" placeholder="Session name" required
                        class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-ocher-yellow">
                    <button type="submit"
                        class="w-full bg-ocher-yellow text-white py-2 px-4 rounded-md hover:bg-ocher-yellow-dark transition-colors">
                        Create Session
                    </button>
                </form>
            </div>

            <div class="divider text-center my-4">
                <span class="text-gray-500">or</span>
            </div>

            <div class="join-session">
                <h2 class="text-xl font-dosis mb-4">Join Existing Retrospective</h2>
                <form hx-post="/api/retro/join"
                      hx-headers='{"Content-Type": "application/json"}'
                      hx-ext="json-enc"
                      class="space-y-3">
                    <div th:if="${#authentication == null || #authentication.principal == 'anonymousUser'}" class="space-y-2">
                        <input type="text" name="displayName" placeholder="Your name" required
                            class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-ocher-yellow">
                    </div>
                    <input type="text" name="retroId" placeholder="Session ID" required
                        class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-ocher-yellow">
                    <button type="submit"
                        class="w-full bg-ocher-yellow text-white py-2 px-4 rounded-md hover:bg-ocher-yellow-dark transition-colors">
                        Join Session
                    </button>
                </form>
            </div>
            
            <!-- Error message display -->
            <div th:if="${param.error != null}" 
                 class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mt-4" 
                 role="alert">
                <p th:if="${param.error != null && #arrays.contains(param.error, 'missing_name')}">Please enter a session name</p>
                <p th:if="${param.error != null && #arrays.contains(param.error, 'missing_username')}">Please enter your name</p>
                <p th:if="${param.error != null && #arrays.contains(param.error, 'missing_id')}">Please enter a session ID</p>
                <p th:if="${param.error != null && #arrays.contains(param.error, 'session_not_found')}">Session not found</p>
                <p th:if="${param.error != null && #arrays.contains(param.error, 'not_participant')}">You are not a participant in this session</p>
            </div>
        </div>
    </div>
</div>
