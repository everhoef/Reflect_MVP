<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="participantsList">
        <ul id="participants-list" class="space-y-2">
            <li th:each="participant : ${participants}"
                class="px-4 py-2 bg-gray-50 rounded-md flex justify-between items-center">
                <span th:text="${participant.displayName}">Participant Name</span>
                <span th:if="${participant.role.name() == 'FACILITATOR'}"
                      class="ml-2 text-xs bg-ocher-yellow text-white px-2 py-1 rounded">
                    Facilitator
                </span>
            </li>
        </ul>
    </div>
</body>

</html>
