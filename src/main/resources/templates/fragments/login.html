<div th:fragment="content">
    <div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
        <div class="max-w-md w-full space-y-8 bg-white rounded-xl shadow-lg p-8">
            <div class="text-center">
                <h1 class="text-3xl font-dosis font-bold text-gray-900 mb-2">
                    <span sec:authorize="hasRole('GUEST')">Upgrade to Full Account</span>
                    <span sec:authorize="!hasRole('GUEST')">Login</span>
                </h1>
                <p class="text-gray-600">
                    <span sec:authorize="hasRole('GUEST')">Sign in to save your retrospectives and access advanced features</span>
                    <span sec:authorize="!hasRole('GUEST')">Sign in to your account</span>
                </p>
            </div>

            <!-- Spring Security Login Form -->
            <form method="post" action="/login" class="space-y-6">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="loginType" value="user"/>
                
                <div>
                    <label for="username" class="sr-only">Username</label>
                    <input id="username" name="username" type="text" required 
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-ocher-yellow focus:border-ocher-yellow"
                           placeholder="Username">
                </div>
                
                <div>
                    <label for="password" class="sr-only">Password</label>
                    <input id="password" name="password" type="password" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-ocher-yellow focus:border-ocher-yellow"
                           placeholder="Password">
                </div>

                <div>
                    <button type="submit"
                            class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-ocher-yellow hover:bg-ocher-yellow-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-ocher-yellow">
                        Sign in
                    </button>
                </div>
            </form>

            <!-- Back to main page -->
            <div class="text-center">
                <a th:href="@{/home}" sec:authorize="hasRole('GUEST')" class="text-sm text-gray-600 hover:text-ocher-yellow">
                    ← Continue as Guest
                </a>
                <a th:href="@{/}" sec:authorize="!hasRole('GUEST')" class="text-sm text-gray-600 hover:text-ocher-yellow">
                    ← Back to main page
                </a>
            </div>

            <!-- Error message display -->
            <div th:if="${param.error != null}" 
                 class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mt-4" 
                 role="alert">
                <p>Invalid username or password. Please try again.</p>
            </div>
        </div>
    </div>
</div>
