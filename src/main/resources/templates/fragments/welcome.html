<div th:fragment="content">
    <div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
        <div class="max-w-md w-full space-y-8 bg-white rounded-xl shadow-lg p-8">
            <div class="text-center">
                <h1 class="text-3xl font-dosis font-bold text-gray-900 mb-2">Team Retrospective</h1>
                <p class="text-gray-600">Join a retrospective session</p>
            </div>

            <!-- Login Type Toggle -->
            <div class="flex bg-gray-100 rounded-lg p-1">
                <button id="userLoginTab" 
                        class="flex-1 px-4 py-2 text-sm font-medium rounded-md bg-white text-gray-900 shadow-sm transition-colors">
                    User Login
                </button>
                <button id="guestLoginTab" 
                        class="flex-1 px-4 py-2 text-sm font-medium rounded-md text-gray-600 hover:text-gray-900 transition-colors">
                    Guest Access
                </button>
            </div>

            <!-- Unified Login Form -->
            <form method="post" action="/login" class="space-y-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" id="loginType" name="loginType" value="user"/>
                
                <!-- User Login Fields -->
                <div id="userFields" class="space-y-4">
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <input type="text" id="username" name="username" 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-ocher-yellow focus:border-ocher-yellow">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="password" name="password" 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-ocher-yellow focus:border-ocher-yellow">
                    </div>
                </div>

                <!-- Guest Login Fields -->
                <div id="guestFields" class="space-y-4 hidden">
                    <div>
                        <label for="displayName" class="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
                        <input type="text" id="displayName" name="displayName" placeholder="Enter your display name"
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <p class="text-sm text-gray-600">Quick access without account. Session won't be saved after completion.</p>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitButton"
                        class="w-full inline-flex justify-center items-center px-4 py-2 bg-ocher-yellow text-white rounded-md hover:bg-ocher-yellow-dark transition duration-300 font-medium">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013 3v1"></path>
                    </svg>
                    <span id="submitText">Login</span>
                </button>
            </form>

            <!-- Error message display -->
            <div th:if="${param.error != null}" 
                 class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4" 
                 role="alert">
                <p th:if="${param.error != null && #arrays.contains(param.error, 'missing_display_name')}">Please enter your name to continue as guest</p>
                <p th:if="${param.error != null && #arrays.contains(param.error, 'missing_credentials')}">Please enter both username and password</p>
                <p th:if="${param.error != null && #arrays.contains(param.error, 'invalid_credentials')}">Invalid username or password</p>
                <p th:if="${param.error != null && #arrays.contains(param.error, 'invalid_login_type')}">Invalid login type</p>
                <p th:if="${param.error != null && #arrays.contains(param.error, 'authentication_failed')}">Authentication failed. Please try again.</p>
            </div>
        </div>
    </div>

    <!-- JavaScript for tab switching -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userTab = document.getElementById('userLoginTab');
            const guestTab = document.getElementById('guestLoginTab');
            const userFields = document.getElementById('userFields');
            const guestFields = document.getElementById('guestFields');
            const loginType = document.getElementById('loginType');
            const submitButton = document.getElementById('submitButton');
            const submitText = document.getElementById('submitText');

            function switchToUser() {
                userTab.className = 'flex-1 px-4 py-2 text-sm font-medium rounded-md bg-white text-gray-900 shadow-sm transition-colors';
                guestTab.className = 'flex-1 px-4 py-2 text-sm font-medium rounded-md text-gray-600 hover:text-gray-900 transition-colors';
                userFields.classList.remove('hidden');
                guestFields.classList.add('hidden');
                loginType.value = 'user';
                submitButton.className = 'w-full inline-flex justify-center items-center px-4 py-2 bg-ocher-yellow text-white rounded-md hover:bg-ocher-yellow-dark transition duration-300 font-medium';
                submitText.textContent = 'Login';
                
                // Set required attributes
                document.getElementById('username').required = true;
                document.getElementById('password').required = true;
                document.getElementById('displayName').required = false;
            }

            function switchToGuest() {
                guestTab.className = 'flex-1 px-4 py-2 text-sm font-medium rounded-md bg-white text-gray-900 shadow-sm transition-colors';
                userTab.className = 'flex-1 px-4 py-2 text-sm font-medium rounded-md text-gray-600 hover:text-gray-900 transition-colors';
                guestFields.classList.remove('hidden');
                userFields.classList.add('hidden');
                loginType.value = 'guest';
                submitButton.className = 'w-full inline-flex justify-center items-center px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600 transition duration-300 font-medium';
                submitText.textContent = 'Continue as Guest';
                
                // Set required attributes
                document.getElementById('username').required = false;
                document.getElementById('password').required = false;
                document.getElementById('displayName').required = true;
            }

            userTab.addEventListener('click', switchToUser);
            guestTab.addEventListener('click', switchToGuest);

            // Initialize with user login by default
            switchToUser();
        });
    </script>
</div>
