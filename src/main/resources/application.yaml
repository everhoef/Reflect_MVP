spring:
  docker:
    compose:
      enabled: true
      file: compose.yaml
      lifecycle-management: start-only
  application:
    name: facilitator
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  session:
    timeout: 2h
    redis:
      flush-mode: IMMEDIATE # Sessions flush mode.
      namespace: spring:session # Namespace for keys used to store sessions.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:your-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:your-github-client-secret}
            redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8080/login/oauth2/code/github}
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: login

server:
  servlet:
    session:
      cookie:
        # Set cookie max-age to match server-side session timeout (2h = 7200s).
        # Without this the SESSION cookie is a session cookie (no Max-Age), so
        # closing the browser tab discards it even though the Redis session is
        # still alive — causing users to appear logged out after < 1 hour.
        max-age: 7200

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    direct.reflect.facilitator: "debug"
    direct.reflect.facilitator.eventing: "trace"
    direct.reflect.facilitator.web.RetroViewController: "trace"
    org.springframework.web.servlet.mvc.method.annotation: "debug"
  file:
    name: /tmp/facilitator.log

---
spring:
  config:
    activate:
      on-profile: "import & !test"

facilitator:
  local-auth:
    enabled: true
